      transitions:
        success:
        - "EXTRACT Complete"
      parameters:
        componentName: "Create EXTRACT.AUDIO_FILES"
        scriptLocation: "File"
        fileName: "04 - RESOURCES/SQL/DDL/EXTRACT/AUDIO_FILES.sql"
    Create STAGE.AUDIO_TRANSCRIPT:
      type: "sql-executor"
      transitions:
        success:
        - "STAGE Complete"
      parameters:
        componentName: "Create STAGE.AUDIO_TRANSCRIPT"
        scriptLocation: "File"
        fileName: "04 - RESOURCES/SQL/DDL/STAGE/AUDIO_TRANSCRIPT.sql"
        declareSqlVariables: "Include selected"
    STAGE Complete:
      type: "and"
      transitions:
        unconditional:
        - "Create DIM_CALL_STATUS"
        - "Create DIM_CALL_SENTIMENT"
        - "Create DIM_CALL_PRIORITY"
        - "Create DIM_CALL_TYPE"
        - "Create DIM_AGENT"
      parameters:
        componentName: "STAGE Complete"
    EXTRACT Complete:
      type: "and"
      transitions:
        unconditional:
        - "Create STAGE.AUDIO_TRANSCRIPT_ANLYSIS"
        - "Create STAGE.AUDIO_TRANSCRIPT"
      parameters:
        componentName: "EXTRACT Complete"
    Create EXTRACT.LOOKUP:
      type: "sql-executor"
      transitions:
        success:
        - "EXTRACT Complete"
      parameters:
        componentName: "Create EXTRACT.LOOKUP"
        scriptLocation: "File"
        fileName: "04 - RESOURCES/SQL/DDL/EXTRACT/LOOKUP.sql"
    Create STAGE.AUDIO_TRANSCRIPT_ANLYSIS:
      type: "sql-executor"
      transitions:
        success:
        - "STAGE Complete"
      parameters:
        componentName: "Create STAGE.AUDIO_TRANSCRIPT_ANLYSIS"
        scriptLocation: "File"
        fileName: "04 - RESOURCES/SQL/DDL/STAGE/AUDIO_TRANSCRIPT_ANALYSIS.sql"
        declareSqlVariables: "Include selected"
    Drop All Tables - EXTRACT:
      type: "sql-executor"
      transitions:
        success:
        - "All Tables Dropped"
      parameters:
        componentName: "Drop All Tables - EXTRACT"
        scriptLocation: "Component"
        sqlScript: |
          DROP TABLE IF EXISTS EXTRACT.AUDIO_FILES;
          DROP TABLE IF EXISTS EXTRACT.LOOKUP;
        declareSqlVariables: "Include selected"
    Drop All Tables - DWH:
      type: "sql-executor"
      transitions:
        success:
        - "All Tables Dropped"
      parameters:
        componentName: "Drop All Tables - DWH"
        scriptLocation: "Component"
        sqlScript: |-
          DROP TABLE IF EXISTS DIM_AGENT;
          DROP TABLE IF EXISTS DIM_CALL_PRIORITY;
          DROP TABLE IF EXISTS DIM_CALL_TYPE;
          DROP TABLE IF EXISTS DIM_CALL_SENTIMENT;
          DROP TABLE IF EXISTS DIM_CALL_STATUS;
    All Tables Dropped:
      type: "and"
      transitions:
        unconditional:
        - "Create EXTRACT.AUDIO_FILES"
        - "Create EXTRACT.LOOKUP"
      parameters:
        componentName: "All Tables Dropped"
    Drop All Tables - STAGE:
      type: "sql-executor"
      transitions:
        success:
        - "All Tables Dropped"
      parameters:
        componentName: "Drop All Tables - STAGE"
        scriptLocation: "Component"
        sqlScript: |
          DROP TABLE IF EXISTS STAGE.AUDIO_TRANSCRIPT;
          DROP TABLE IF EXISTS STAGE.AUDIO_TRANSCRIPT_ANALYSIS;
        declareSqlVariables: "Include selected"
