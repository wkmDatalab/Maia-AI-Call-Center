      transitions:
        success:
        - "Dimensions Complete"
      parameters:
        componentName: "Create DIM_CALL_TYPE"
        scriptLocation: "File"
        fileName: "04 - RESOURCES/SQL/DDL/DWH/DIM_CALL_TYPE.sql"
    Create DIM_CALL_SENTIMENT:
      type: "sql-executor"
      transitions:
        success:
        - "Dimensions Complete"
      parameters:
        componentName: "Create DIM_CALL_SENTIMENT"
